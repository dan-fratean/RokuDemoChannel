<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RokuDemoChannel — brs-engine</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #16151a; color: #e8e6ef;
    font: 14px/1.4 system-ui, sans-serif; display: flex;
    height: 100vh; overflow: hidden;
  }
  #stage {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 16px; gap: 12px; overflow-y: auto;
  }
  h1 { font-size: 15px; font-weight: 600; margin: 0; color: #b9b4cc; }
  h1 small { color: #6c6680; font-weight: 400; }
  #screen-wrap {
    position: relative; width: min(1280px, 100%); aspect-ratio: 16 / 9;
    background: #000; border: 1px solid #322d40; border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }
  #display, #player { position: absolute; inset: 0; width: 100%; height: 100%; }
  #player { z-index: 1; object-fit: contain; background: #000; }
  #display { z-index: 2; }
  #stats { position: absolute; top: 6px; left: 6px; z-index: 3; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center; }
  button {
    background: #2a2636; color: #e8e6ef; border: 1px solid #443d57; border-radius: 6px;
    padding: 7px 12px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #352f47; }
  button:active { transform: translateY(1px); }
  button.accent { background: #6d4aff; border-color: #6d4aff; }
  button.accent:hover { background: #7d5cff; }
  .hint { color: #6c6680; font-size: 12px; }
  kbd { background:#2a2636; border:1px solid #443d57; border-radius:4px; padding:1px 5px; font-size:11px; }

  aside { width: 380px; height: 100vh; background: #0d0c11; border-left: 1px solid #2a2636; display: flex; flex-direction: column; }
  .console-bar {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 8px 10px; border-bottom: 1px solid #2a2636; background:#100f15;
  }
  .console-bar .seg { display: flex; gap: 2px; }
  .console-bar button.f { padding: 4px 9px; font-size: 12px; opacity: .7; }
  .console-bar button.f.on { opacity: 1; border-color: #6d4aff; background:#2c2444; }
  .console-bar input {
    flex: 1; min-width: 90px; background:#1a1822; color:#e8e6ef; border:1px solid #322d40;
    border-radius:6px; padding:5px 8px; font-size:12px;
  }
  #log { flex: 1; margin: 0; padding: 4px 0; overflow: auto; font: 12px/1.5 ui-monospace, monospace; }
  .entry {
    display: grid; grid-template-columns: 14px 1fr auto; align-items: start; gap: 6px;
    padding: 2px 10px; border-bottom: 1px solid #16151c;
  }
  .entry .dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; background:#5b5570; }
  .entry.error .dot { background:#ff6b6b; } .entry.error .msg { color:#ff9b9b; }
  .entry.warn  .dot { background:#ffce7a; } .entry.warn  .msg { color:#ffd99a; }
  .entry.info  .dot { background:#6dff9e; }
  .entry.debug .dot { background:#4a4760; } .entry.debug { opacity:.72; }
  .entry .body { min-width: 0; }
  .entry .tag { color:#7d7796; margin-right:6px; font-weight:600; }
  .entry .msg { color:#cdc8dc; white-space: pre-wrap; word-break: break-word; }
  .entry.collapsed .msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display:block; }
  .entry .twirl {
    cursor: pointer; color:#8b84a6; user-select:none; padding:0 4px; margin-top:1px;
  }
  .entry .twirl:hover { color:#cbb8ff; }
  .entry .count {
    background:#322a4d; color:#cbb8ff; border-radius:9px; font-size:10px; padding:0 6px;
    margin-top:2px; height:15px; line-height:15px;
  }
  .console-foot { padding:6px 10px; border-top:1px solid #2a2636; color:#6c6680; font-size:11px; }
</style>
</head>
<body>
  <main id="stage">
    <h1>RokuDemoChannel <small>· brs-engine (no hardware)</small></h1>

    <div id="screen-wrap">
      <canvas id="display" width="1280" height="720"></canvas>
      <video id="player" playsinline></video>
      <canvas id="stats"></canvas>
    </div>

    <div class="row">
      <button class="accent" data-act="run">▶ Run channel</button>
      <button data-act="rebuild">⟳ Rebuild zip</button>
      <button data-act="key" data-key="back">← Back</button>
      <button data-act="key" data-key="home">⌂ Home</button>
      <button data-act="mute">🔇 Mute</button>
    </div>

    <div class="row"><button data-act="key" data-key="up">▲</button></div>
    <div class="row">
      <button data-act="key" data-key="left">◀</button>
      <button data-act="key" data-key="select">OK</button>
      <button data-act="key" data-key="right">▶</button>
    </div>
    <div class="row"><button data-act="key" data-key="down">▼</button></div>
    <div class="row">
      <button data-act="key" data-key="rev">⏪</button>
      <button data-act="key" data-key="play">⏯</button>
      <button data-act="key" data-key="fwd">⏩</button>
      <button data-act="key" data-key="info">ℹ Info</button>
    </div>

    <p class="hint">
      Keyboard: <kbd>↑↓←→</kbd> d-pad · <kbd>Enter</kbd> OK · <kbd>Esc</kbd>/<kbd>Backspace</kbd> Back ·
      <kbd>Home</kbd> Home · <kbd>i</kbd> Info · <kbd>,</kbd>/<kbd>.</kbd> rev/fwd · <kbd>Space</kbd> play
    </p>
  </main>

  <aside>
    <div class="console-bar">
      <div class="seg">
        <button class="f on" data-filter="all">All</button>
        <button class="f" data-filter="info">Info</button>
        <button class="f" data-filter="warn">Warn</button>
        <button class="f" data-filter="error">Error</button>
      </div>
      <button class="f" data-toggle="noise" title="Hide beacon/print spam">🔇 Noise</button>
      <input id="filter" placeholder="filter text…" />
      <button data-act="clear" title="Clear console">Clear</button>
    </div>
    <div id="log"></div>
    <div class="console-foot"><span id="counts">0 lines</span> · click a row to expand</div>
  </aside>

  <script src="./brs.api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
